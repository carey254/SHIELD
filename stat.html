<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFGBV Yearly Stats</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background-image: url('server/image.png');
  background-size: cover;       
  background-position: center;  /* Center the image */
  background-repeat: no-repeat; /* Prevent tiling */
  padding: 2rem;
  overflow-x: hidden;
}


    h1 {
      text-align: center;
      margin-bottom: 2rem;
      color: aliceblue;
    }

    .year-section {
      display: none;
      animation: fadeIn 1s ease-in-out;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 4rem;
    }

    .stat-box {
      background-color: rgba(206, 130, 16, 0.3);
      border-radius: 15px;
      padding: 1rem;
      text-align: center;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .stat-box .percentage {
      font-size: 2rem;
      font-weight: bold;
      color: #ffdd57;
    }

    .stat-box .text {
        color: aliceblue;
      font-size: 1rem;
      margin-top: 0.5rem;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background-color: #444;
      border-radius: 5px;
      margin-top: 1rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background-color: #ffdd57;
      width: 0%;
      transition: width 2s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <h1><strong> Impact of TFGBV (2015–2026) </strong></h1>

  <div id="stat-wrapper"></div>

  <script>
    const yearlyStats = {
      "2020": [
        { value: 53, text: "of teen girls and LGBTQ+ youth experienced digital harassment." },
        { value: 38, text: "of young girls under 18 faced online abuse." },
        { value: 45, text: "of youth reported online trauma from bullying." },
        { value: 50, text: "of affected individuals were unsure how to report." },
        { value: 35, text: "of cases were never addressed by platforms." },
        { value: 27, text: "experienced long-term psychological effects." },
        { value: 14, text: "thought of suicide after online abuse." }
      ],
      "2021": [
        { value: 57, text: "of survivors reported emotional trauma from online harm." },
        { value: 48, text: "of incidents happened on social media." },
        { value: 33, text: "of cases involved image-based abuse." },
        { value: 30, text: "of affected users were under 18." },
        { value: 19, text: "of victims were targeted repeatedly." },
        { value: 16, text: "reported attempted suicide." },
        { value: 24, text: "filed complaints that were never resolved." }
      ],
      "2022": [
        { value: 61, text: "of reports were ignored by online platforms." },
        { value: 40, text: "of abuse included hate speech." },
        { value: 34, text: "involved non-consensual content sharing." },
        { value: 28, text: "of victims were afraid to speak out." },
        { value: 20, text: "developed anxiety or PTSD." },
        { value: 13, text: "lost opportunities due to online shaming." },
        { value: 12, text: "dropped out of school or work." }
      ],
      "2023": [
        { value: 65, text: "of users considered quitting social media due to harm." },
        { value: 43, text: "of youth felt digitally unsafe." },
        { value: 38, text: "had multiple accounts hacked or doxxed." },
        { value: 29, text: "of LGBTQ+ youth faced targeted harassment." },
        { value: 26, text: "felt excluded from online communities." },
        { value: 18, text: "stopped engaging with online learning." },
        { value: 15, text: "attempted self-harm after abuse." }
      ],
      "2024": [
        { value: 70, text: "of abuse survivors reported mental health effects." },
        { value: 55, text: "of teens were affected by online blackmail or sextortion." },
        { value: 39, text: "feared further harm if they reported." },
        { value: 32, text: "had their images shared without consent." },
        { value: 25, text: "experienced threats against family or friends." },
        { value: 21, text: "were retraumatized by platform inaction." },
        { value: 17, text: "attempted suicide or had suicidal ideation." }
      ],
      "2025": [
        { value: 75, text: "received no justice or follow-up support." },
        { value: 58, text: "of victims withdrew from online life entirely." },
        { value: 46, text: "reported loss of self-esteem or isolation." },
        { value: 36, text: "were attacked using AI-generated content." },
        { value: 31, text: "were impersonated in online scams." },
        { value: 19, text: "lost jobs or academic opportunities." },
        { value: 22, text: "developed long-term depression." }
      ],
      "2026": [
        { value: 80, text: "of victims include women, youth, LGBTQ+, and marginalized groups." },
        { value: 63, text: "continue to live in fear of digital abuse." },
        { value: 51, text: "felt invisible or silenced online." },
        { value: 44, text: "live with trauma from repeated online attacks." },
        { value: 33, text: "have never found a safe digital space." },
        { value: 26, text: "lack mental health resources post-abuse." },
        { value: 20, text: "live with unresolved cases or open threats." }
      ]
    };

    const wrapper = document.getElementById("stat-wrapper");
    const years = Object.keys(yearlyStats);
    let currentYearIndex = 0;

    function createYearSection(year, data) {
      const section = document.createElement("div");
      section.className = "year-section";
      section.id = `year-${year}`;

      const title = document.createElement("h2");
      title.textContent = year;
      section.appendChild(title);

      const grid = document.createElement("div");
      grid.className = "grid";

      data.forEach(stat => {
        const box = document.createElement("div");
        box.className = "stat-box";

        const percent = document.createElement("div");
        percent.className = "percentage";
        percent.textContent = "0%";

        const desc = document.createElement("div");
        desc.className = "text";
        desc.textContent = stat.text;

        const progress = document.createElement("div");
        progress.className = "progress-bar";
        const fill = document.createElement("div");
        fill.className = "progress-fill";
        progress.appendChild(fill);

        box.appendChild(percent);
        box.appendChild(desc);
        box.appendChild(progress);

        grid.appendChild(box);

        animateStat(percent, fill, stat.value);
      });

      section.appendChild(grid);
      return section;
    }

    function rotateSections() {
      const oldSections = document.querySelectorAll(".year-section");
      oldSections.forEach(sec => sec.style.display = "none");

      const year = years[currentYearIndex];
      let section = document.getElementById(`year-${year}`);

      if (!section) {
        section = createYearSection(year, yearlyStats[year]);
        wrapper.appendChild(section);
      }

      section.style.display = "block";
      currentYearIndex = (currentYearIndex + 1) % years.length;
    }

    function animateStat(element, fillEl, target) {
      let current = 0;
      const steps = 30;
      const increment = target / steps;
      const interval = 50;

      const animate = setInterval(() => {
        current += increment;
        if (current >= target) {
          current = target;
          clearInterval(animate);
        }
        element.textContent = `${Math.round(current)}%`;
        fillEl.style.width = `${current}%`;
      }, interval);
    }

    rotateSections();
    setInterval(rotateSections, 8000); // rotates every 8 seconds
  </script>
</body>
</html>
