/* Footer */

.footer {
    background: #111 !important;
    color: #fff !important;
    padding: 40px 0 10px !important;
    font-family: 'Segoe UI', sans-serif !important;
    width: 100vw !important;
    box-sizing: border-box !important;
    margin: 0 !important;
    position: relative !important;
    left: 0 !important;
    right: 0 !important;
  }
  
  
  
  
  .footer-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    align-items: flex-start;
    gap: 30px;
  }
  
  .footer-logo img {
    max-height: 150px;
  }
  
  .footer-links, .footer-location, .footer-contact {
    max-width: 250px;
  }
  
  .footer-links h3,
  .footer-location h3,
  .footer-contact h3 {
    margin-bottom: 10px;
    font-weight: bold;
  }
  .footer-links h3 {
    color: orange;
  }
  .footer-location h3,
  .footer-contact h3 {
    color: orange;
  }
  
  
  
  .footer-links ul {
    list-style: none;
    padding: 0;
  }
  
  .footer-links ul li {
    margin-bottom: 6px;
  }
  
  .footer-links ul li a,
  .footer-contact p,
  .footer-location p {
    color: #ccc;
    text-decoration: none;
    font-size: 15px;
  }
  
  .footer-links .donate-btn {
    background-color: #f2b400;
    padding: 5px 10px;
    border-radius: 5px;
    display: inline-block;
    margin-top: 10px;
    font-weight: bold;
    color: #000;
  }
  
  .payment-icons img {
    margin-top: 10px;
    margin-right: 8px;
  }
  
  .social-icons {
    display: flex; /* Arrange icons in a row */
    gap: 15px;     /* Add space between icons */
    margin-top: 10px; /* Add some space below the heading */
    align-items: center; /* Vertically align icons */
  }
  
  .social-icons a img {
    width: 32px;   /* Adjust size as needed */
    height: 32px;  /* Ensure aspect ratio is maintained */
    border-radius: 5px; /* Optional: slight roundness for icons */
  }
  
  .footer-bottom {
    text-align: center;
    margin-top: 30px;
    font-size: 14px;
    color: #aaa;
    border-top: 1px solid #333;
    padding-top: 10px;
  }
  
  
  
    
    /* Make sure it stacks only on smaller screens */
    @media (max-width: 768px) {
      .footer-container {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
    
      .footer-section {
        margin-bottom: 20px;
      }
    }
